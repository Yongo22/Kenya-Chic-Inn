name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: APP/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: APP

      - name: Build
        run: npm run build
        working-directory: APP

